apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading-platform

resources:
  - ../../base

# Image tags are updated here by CI pipeline
# Format: main-<short-sha>  e.g. main-abc1234
images:
  - name: ghcr.io/rajdebnath1988/trading-frontend
    newTag: "main-67db0f1" # frontend
  - name: ghcr.io/rajdebnath1988/trading-api-gateway
    newTag: "main-67db0f1" # api-gateway
  - name: ghcr.io/rajdebnath1988/trading-auth-service
    newTag: "main-67db0f1" # auth-service
  - name: ghcr.io/rajdebnath1988/trading-market-data-service
    newTag: "main-67db0f1" # market-data-service
  - name: ghcr.io/rajdebnath1988/trading-order-service
    newTag: "main-67db0f1" # order-service
  - name: ghcr.io/rajdebnath1988/trading-portfolio-service
    newTag: "main-67db0f1" # portfolio-service

