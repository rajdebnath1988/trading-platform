apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-gateway
  namespace: trading-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    blueGreen:
      activeService: api-gateway-active
      previewService: api-gateway-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 60
      prePromotionAnalysis:
        templates:
        - templateName: health-check
        args:
        - name: service-name
          value: api-gateway-preview
        - name: service-port
          value: "3000"
      postPromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: api-gateway-active
        - name: service-port
          value: "3000"
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: api-gateway
        image: ghcr.io/rajdebnath1988/trading-api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet: { path: /health, port: 3000 }
          initialDelaySeconds: 40
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet: { path: /health, port: 3000 }
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
---
# Active service — receives 100% production traffic
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-active
  namespace: trading-platform
  labels:
    app: api-gateway
    slot: active
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    name: http
---
# Preview service — receives traffic for testing new (green) version
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-preview
  namespace: trading-platform
  labels:
    app: api-gateway
    slot: preview
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    name: http
---
# Reusable analysis template — health check
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: health-check
  namespace: trading-platform
spec:
  args:
  - name: service-name
  - name: service-port
  metrics:
  - name: health-endpoint
    interval: 10s
    count: 5
    successCondition: result == "ok"
    failureLimit: 1
    provider:
      web:
        url: "http://{{args.service-name}}:{{args.service-port}}/health"
        jsonPath: "{$.status}"
---
# Reusable analysis template — post-promotion success rate
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: trading-platform
spec:
  args:
  - name: service-name
  - name: service-port
  metrics:
  - name: success-rate-check
    interval: 15s
    count: 4
    successCondition: result == "ok"
    failureLimit: 1
    provider:
      web:
        url: "http://{{args.service-name}}:{{args.service-port}}/health"
        jsonPath: "{$.status}"
