name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

  # ────────────────────────────────────────────────────────
  # JOB 1: Secret Scanning — GitLeaks
  # ────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 GitLeaks — Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for gitleaks

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────
  # JOB 2: Code Quality — SonarCloud
  # ────────────────────────────────────────────────────────
  sonarcloud:
    name: "📊 SonarCloud — Code Quality"
    runs-on: ubuntu-latest
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ────────────────────────────────────────────────────────
  # JOB 3: Build + Trivy Scan + Push (parallel matrix)
  # ────────────────────────────────────────────────────────
  build-scan-push:
    name: "🐳 ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: [gitleaks]
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend,              path: services/frontend              }
          - { name: api-gateway,           path: services/api-gateway           }
          - { name: auth-service,          path: services/auth-service          }
          - { name: market-data-service,   path: services/market-data-service   }
          - { name: order-service,         path: services/order-service         }
          - { name: portfolio-service,     path: services/portfolio-service     }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/trading-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: false
          load: true
          tags: scan-target:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max

      - name: Trivy — vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      scan-target:latest
          format:         sarif
          output:         trivy-results.sarif
          severity:       CRITICAL,HIGH
          exit-code:      '1'
          ignore-unfixed: true
          vuln-type:      os,library
          timeout:        10m
          trivyignores:   .trivyignore
          skip-dirs:      /usr/local/lib/node_modules/npm,/usr/local/lib/node_modules/npm/node_modules,/app/node_modules,/root/.npm,/usr/local/lib/python3.11/site-packages/setuptools,/usr/local/lib/python3.11/site-packages/pip,/usr/local/lib/python3.11/site-packages/wheel

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category:   trivy-${{ matrix.service.name }}

      - name: Push multi-arch image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.service.path }}
          push:       true
          platforms:  linux/amd64,linux/arm64
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=main-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max

  # ────────────────────────────────────────────────────────
  # JOB 4: Update K8s image tags → ArgoCD auto-syncs
  # ────────────────────────────────────────────────────────
  update-manifests:
    name: "📝 Update Manifests — trigger ArgoCD"
    runs-on: ubuntu-latest
    needs: [build-scan-push, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Compute short SHA tag
        id: tag
        run: echo "TAG=main-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update image tags in kustomization.yaml
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          FILE=k8s/overlays/production/kustomization.yaml
          SERVICES="frontend api-gateway auth-service market-data-service order-service portfolio-service"
          for svc in $SERVICES; do
            # Replace tag inline using sed — matches the comment anchor
            sed -i "s|newTag: \"main-[^\"]*\" # ${svc}|newTag: \"${TAG}\" # ${svc}|g" "$FILE"
          done
          echo "Updated tags to $TAG"
          grep "newTag" "$FILE"

      - name: Commit and push updated manifests
        run: |
          git config user.email "ci-bot@tradex.internal"
          git config user.name  "TradeX CI Bot"
          git add k8s/overlays/production/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes — skipping commit"
          else
            git commit -m "ci: deploy ${{ steps.tag.outputs.TAG }} [skip ci]"
            git push
          fi
